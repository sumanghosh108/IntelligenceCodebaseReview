version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ICR_OLLAMA_BASE_URL=http://ollama:11434
      - ICR_OLLAMA_MODEL=llama3
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ollama_data:
